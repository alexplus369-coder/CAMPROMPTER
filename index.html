<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teleprompter Pro Studio</title>
    
    <style>
        :root {
            --bg-color: #0f172a;
            --text-color: #f8fafc;
            --accent-color: #10b981;
            --danger-color: #ef4444;
            --panel-bg: rgba(30, 41, 59, 0.95);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', system-ui, sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* --- Panel de Control --- */
        #toolbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: var(--panel-bg);
            padding: 15px 20px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            z-index: 100;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease, opacity 0.3s ease;
        }

        #toolbar.hidden {
            transform: translateY(-100%);
            opacity: 0;
            pointer-events: none;
        }

        .btn, button, select {
            background-color: #3b82f6;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            outline: none;
            text-decoration: none;
        }
        
        select { background-color: #475569; }
        .btn:hover, button:hover, select:hover { background-color: #2563eb; }
        .btn:active, button:active { transform: scale(0.95); }
        
        #btn-record-ia { background-color: #8b5cf6; }
        #btn-record-ia:hover { background-color: #7c3aed; }
        .active-feature { background-color: #10b981 !important; border: 2px solid white; }
        .active-audio { background-color: #f59e0b !important; }

        /* --- Contenedor del Texto --- */
        #scroll-container {
            flex-grow: 1;
            overflow-y: auto;
            scroll-behavior: smooth;
            padding: 0 10%;
            scrollbar-width: none;
            background: rgba(15, 23, 42, 0.4);
        }
        #scroll-container::-webkit-scrollbar { display: none; }

        #teleprompter-text {
            font-size: 64px;
            line-height: 1.6;
            font-weight: 600;
            text-align: center;
            padding-top: 40vh;
            padding-bottom: 60vh;
            outline: none;
            transition: transform 0.3s ease;
        }

        .mirrored { transform: scaleX(-1); }
        .placeholder { color: #94a3b8; font-weight: normal; }

        /* --- Subtítulos en Vivo --- */
        #live-subtitle {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            color: var(--accent-color);
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 20px;
            font-weight: bold;
            z-index: 100;
            pointer-events: none;
            border: 1px solid rgba(16, 185, 129, 0.3);
            text-align: center;
            max-width: 90%;
            transition: opacity 0.3s;
        }
        .subtitle-hidden { opacity: 0; }
        .subtitle-error { color: #ef4444 !important; border-color: #ef4444 !important; }
        .subtitle-info { color: #3b82f6 !important; border-color: #3b82f6 !important; }

        /* --- Estilos de Cámara --- */
        #camera-feed {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            z-index: -1;
            opacity: 0;
        }
        #camera-feed.active { opacity: 1; }

        /* --- Alto Contraste --- */
        body.high-contrast {
            --bg-color: #000000;
            --text-color: #eab308;
            --accent-color: #eab308;
            --panel-bg: rgba(0, 0, 0, 0.95);
        }
        body.high-contrast #scroll-container { background: rgba(0, 0, 0, 0.85); }
        body.high-contrast #teleprompter-text { font-weight: 800; }

        /* --- Zona de Enfoque --- */
        #focus-zone {
            position: fixed;
            top: 50%;
            left: 0;
            width: 100%;
            height: 100px;
            transform: translateY(-50%);
            border-top: 2px dashed var(--accent-color);
            border-bottom: 2px dashed var(--accent-color);
            background-color: rgba(0, 0, 0, 0.2);
            pointer-events: none;
            z-index: 40;
            opacity: 1;
            transition: opacity 0.3s;
        }
        #focus-zone.hidden { opacity: 0; }

        /* --- BOTÓN FLOTANTE DE DETENER --- */
        #floating-stop {
            position: fixed;
            top: 20px;
            right: 20px;
            background-color: var(--danger-color);
            color: white;
            border: none;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            cursor: pointer;
            z-index: 200;
            box-shadow: 0 4px 15px rgba(239, 68, 68, 0.5);
            transition: transform 0.2s, opacity 0.3s;
            opacity: 0;
            pointer-events: none;
            animation: pulse-stop 2s infinite;
        }
        #floating-stop.visible { opacity: 1; pointer-events: auto; }
        #floating-stop:hover { transform: scale(1.1); }

        @keyframes pulse-stop {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }

        /* --- CONTROLES DE AUTO-SCROLL --- */
        #auto-scroll-controls {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(30, 41, 59, 0.9);
            padding: 10px 20px;
            border-radius: 25px;
            display: flex;
            gap: 15px;
            z-index: 200;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        #auto-scroll-controls.visible { opacity: 1; pointer-events: auto; }
        .scroll-btn {
            background: transparent;
            color: white;
            font-size: 24px;
            padding: 5px 15px;
            border: 2px solid #3b82f6;
            border-radius: 20px;
        }
        .scroll-btn.play { background: #3b82f6; }
        .scroll-btn.play.active { background: #10b981; border-color: #10b981; }

        /* --- PANTALLA DE PREVISUALIZACIÓN Y DESCARGA --- */
        #preview-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(15, 23, 42, 0.98);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 1;
            transition: opacity 0.3s;
        }
        #preview-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }
        #preview-video {
            max-width: 90%;
            max-height: 60vh;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            margin: 20px 0;
            background: #000;
        }
        .preview-actions {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .btn-download {
            background-color: var(--accent-color);
            font-size: 18px;
            padding: 15px 30px;
        }
        .btn-download:hover { background-color: #059669; }
        .title-preview { color: white; margin-bottom: 5px; font-size: 24px; text-align: center; }
    </style>
</head>
<body>

    <video id="camera-feed" autoplay muted playsinline></video>
    <canvas id="recording-canvas" style="display: none;"></canvas>

    <!-- Canvas Ocultos para Procesamiento Optimizados de IA -->
    <canvas id="process-canvas" style="display: none;"></canvas>
    <canvas id="mask-canvas" style="display: none;"></canvas>

    <div id="toolbar">
        <select id="formatSelect" title="Formato de Grabación">
            <option value="auto" selected>📹 Auto</option>
            <option value="9:16">📱 9:16</option>
            <option value="1:1">⬛ 1:1</option>
            <option value="16:9">📺 16:9</option>
        </select>
        
        <button id="btn-bg-toggle" title="Activar Croma con IA">🪄 Fondo: Off</button>
        <button id="btn-bg-select" title="Cambiar Fondo" style="display:none; background-color: #6366f1;">📁 Fondo</button>
        <input type="file" id="file-bg" accept="image/*,video/*" style="display:none;">

        <!-- BOTÓN: PLANTILLA / OVERLAY -->
        <button id="btn-overlay-select" title="Añadir Plantilla Transparente" style="background-color: #ec4899;">🖼️ Plantilla</button>
        <input type="file" id="file-overlay" accept="image/png" style="display:none;">

        <button id="btn-record">Grabar Video</button>
        <button id="btn-record-ia">Rec IA ✨</button>
        <button id="btn-mic">Solo Voz (IA)</button>
        
        <button id="btn-mirror">🪞 Espejo</button>
        <button id="btn-enhance-audio">🎙️ Audio Normal</button>
        <button id="btn-font-down">A-</button>
        <button id="btn-font-up">A+</button>
        <button id="btn-contrast">🌓 Contraste</button>
        <button id="btn-focus">⌖ Enfoque</button>
        <button id="btn-reset">↺ Arriba</button>
    </div>

    <button id="floating-stop" title="Detener">⏹</button>

    <div id="auto-scroll-controls">
        <button id="btn-scroll-slower" class="scroll-btn">🐢</button>
        <button id="btn-scroll-play" class="scroll-btn play">▶</button>
        <button id="btn-scroll-faster" class="scroll-btn">🐇</button>
    </div>

    <div id="scroll-container">
        <div id="teleprompter-text" contenteditable="true" class="placeholder">
            Haz clic aquí y pega tu guion. <br><br>
            Asegúrate de dar permisos. <br>Puedes grabar, cambiar el fondo con IA, usar auto-scroll o seguir tu voz.
        </div>
    </div>

    <div id="focus-zone" class="hidden"></div>
    <div id="live-subtitle" class="subtitle-hidden">Esperando...</div>

    <!-- Pantalla de Previsualización y Descarga -->
    <div id="preview-overlay" class="hidden">
        <h2 class="title-preview">¡Grabación Terminada!</h2>
        <p style="color: #94a3b8; text-align: center;">Revisa tu video y guárdalo en tu galería.</p>
        <video id="preview-video" controls playsinline></video>
        <div class="preview-actions">
            <a id="btn-download-video" class="btn btn-download">⬇️ Descargar Video</a>
            <button id="btn-close-preview" class="btn" style="background-color: var(--danger-color);">Cerrar y Volver</button>
        </div>
    </div>

    <!-- SCRIPT TIPO MODULE: Importación Dinámica Asegurada -->
    <script type="module">
        /** ALGORITMO VOICE TRACKER */
        class VoiceTracker {
            constructor(fullText) {
                this.scriptWords = this.normalize(fullText).split(/\s+/).filter(w => w.length > 0);
                this.currentWordIndex = 0;
                this.searchWindow = 50; 
                this.nGramSize = 2; 
            }
            normalize(text) { return text.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/[^a-z0-9 ]/g, " "); }
            calculateProgress(spokenString) {
                if (this.scriptWords.length === 0) return 0;
                const spokenWords = this.normalize(spokenString).split(/\s+/).filter(w => w.length > 0);
                if (spokenWords.length < this.nGramSize) return this.getScrollPercentage();
                const recentSpoken = spokenWords.slice(-this.nGramSize);
                const startIndex = Math.max(0, this.currentWordIndex - 8);
                const endIndex = Math.min(this.scriptWords.length - this.nGramSize, this.currentWordIndex + this.searchWindow);
                let bestMatchIndex = this.currentWordIndex;
                let highestSimilarity = 0.0;
                for (let i = startIndex; i <= endIndex; i++) {
                    const scriptSlice = this.scriptWords.slice(i, i + this.nGramSize);
                    let matches = 0;
                    for (let j = 0; j < recentSpoken.length; j++) if (recentSpoken[j] === scriptSlice[j]) matches++;
                    const similarity = matches / recentSpoken.length;
                    if (similarity > highestSimilarity && similarity >= 0.5) { 
                        highestSimilarity = similarity;
                        bestMatchIndex = i;
                    }
                }
                if (highestSimilarity >= 0.5) this.currentWordIndex = bestMatchIndex + this.nGramSize;
                return this.getScrollPercentage();
            }
            getScrollPercentage() {
                if (this.scriptWords.length === 0) return 0;
                return Math.max(0, Math.min(1, this.currentWordIndex / this.scriptWords.length));
            }
        }

        // --- REFERENCIAS DOM ---
        const textContainer = document.getElementById('teleprompter-text');
        const scrollContainer = document.getElementById('scroll-container');
        const subtitle = document.getElementById('live-subtitle');
        const toolbar = document.getElementById('toolbar');
        const floatingStop = document.getElementById('floating-stop');
        const autoScrollControls = document.getElementById('auto-scroll-controls');
        
        const videoElement = document.getElementById('camera-feed');
        const recordingCanvas = document.getElementById('recording-canvas');
        const ctx = recordingCanvas.getContext('2d');
        const formatSelect = document.getElementById('formatSelect');

        // Referencias IA Fondo
        const processCanvas = document.getElementById('process-canvas');
        const processCtx = processCanvas.getContext('2d', { willReadFrequently: true });
        const maskCanvas = document.getElementById('mask-canvas');
        const maskCtx = maskCanvas.getContext('2d', { willReadFrequently: true });

        // Variables de Estado Globales
        let voiceTracker = null;
        let isListening = false;
        let isRecordingVideo = false;
        let isIARecording = false;
        let useAudioEnhancement = false;
        
        let recognition = null;
        let mediaRecorder = null;
        let recordedChunks = [];
        let animationFrameId = null;
        let currentSubtitleText = "";
        let finalTranscript = "";

        // Variables Auto-Scroll
        let isAutoScrolling = false;
        let scrollSpeed = 1.5;

        // Variables Recorte, Fondo y Plantilla
        let outputWidth = 0;
        let outputHeight = 0;
        let segmenter = null;
        let isBgRemovalActive = false;
        let isModelLoading = false;
        let bgMedia = null;
        let overlayMedia = null;

        function showMessage(msg, type = '') {
            subtitle.innerText = msg;
            subtitle.className = 'subtitle-hidden';
            setTimeout(() => {
                subtitle.classList.remove('subtitle-hidden');
                if (type) subtitle.classList.add(`subtitle-${type}`);
            }, 10);
        }

        textContainer.addEventListener('focus', function() {
            if (this.classList.contains('placeholder')) {
                this.innerHTML = '';
                this.classList.remove('placeholder');
            }
        });

        // --- ENLACE DE BOTONES PRINCIPALES ---
        document.getElementById('btn-mic').addEventListener('click', () => {
            if (startListeningEngine()) {
                toolbar.classList.add('hidden');
                floatingStop.classList.add('visible');
                textContainer.contentEditable = "false";
            }
        });
        document.getElementById('btn-record').addEventListener('click', () => {
            if (textContainer.innerText.trim() === '') { alert("Pega tu guion."); return; }
            startVideoRecording(false);
        });
        document.getElementById('btn-record-ia').addEventListener('click', () => {
            if (textContainer.innerText.trim() === '') { alert("Pega tu guion."); return; }
            startVideoRecording(true);
        });

        document.getElementById('floating-stop').addEventListener('click', stopAllProcesses);

        // Herramientas Extras
        document.getElementById('btn-mirror').addEventListener('click', () => textContainer.classList.toggle('mirrored'));
        document.getElementById('btn-contrast').addEventListener('click', () => document.body.classList.toggle('high-contrast'));
        document.getElementById('btn-focus').addEventListener('click', () => document.getElementById('focus-zone').classList.toggle('hidden'));
        document.getElementById('btn-reset').addEventListener('click', () => { scrollContainer.scrollTo({ top: 0, behavior: 'smooth' }); if (voiceTracker) voiceTracker.currentWordIndex = 0; });
        
        const btnEnhanceAudio = document.getElementById('btn-enhance-audio');
        btnEnhanceAudio.addEventListener('click', () => {
            useAudioEnhancement = !useAudioEnhancement;
            btnEnhanceAudio.innerText = useAudioEnhancement ? "🎙️ Audio: Studio" : "🎙️ Audio: Normal";
            btnEnhanceAudio.classList.toggle('active-audio', useAudioEnhancement);
        });
        
        let currentFontSize = 64;
        document.getElementById('btn-font-up').addEventListener('click', () => { currentFontSize = Math.min(140, currentFontSize + 8); textContainer.style.fontSize = `${currentFontSize}px`; });
        document.getElementById('btn-font-down').addEventListener('click', () => { currentFontSize = Math.max(24, currentFontSize - 8); textContainer.style.fontSize = `${currentFontSize}px`; });

        // --- SISTEMA DE RECONOCIMIENTO DE VOZ NATIVO ---
        function initNativeSpeechIfNeeded() {
            if (recognition) return true;

            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
                alert("Tu navegador no soporta reconocimiento de voz nativo. Usa Chrome.");
                return false;
            }

            recognition = new SpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = true;
            recognition.lang = 'es-ES';

            recognition.onresult = (event) => {
                let interimTranscript = '';
                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    if (event.results[i].isFinal) {
                        finalTranscript += event.results[i][0].transcript + ' ';
                    } else {
                        interimTranscript += event.results[i][0].transcript;
                    }
                }
                const totalSpoken = finalTranscript + interimTranscript;
                currentSubtitleText = interimTranscript || finalTranscript.split(" ").slice(-8).join(" ");
                
                if (currentSubtitleText.trim() !== '') {
                    subtitle.innerText = currentSubtitleText;
                    subtitle.classList.remove('subtitle-hidden', 'subtitle-error');
                    if (voiceTracker && totalSpoken.trim() !== '') {
                        const progress = voiceTracker.calculateProgress(totalSpoken);
                        const maxScroll = scrollContainer.scrollHeight - scrollContainer.clientHeight;
                        if (maxScroll > 0) {
                            scrollContainer.scrollTo({ top: maxScroll * progress, behavior: 'smooth' });
                        }
                    }
                }
            };

            recognition.onerror = (event) => {
                if (event.error !== 'no-speech') {
                    showMessage("Error micrófono: " + event.error, "error");
                }
            };

            recognition.onend = () => {
                if (isListening) { setTimeout(() => { try { recognition.start(); } catch(e) {} }, 300); }
            };

            return true;
        }

        function startListeningEngine() {
            if (textContainer.innerText.trim() === '') {
                alert("Primero pega o escribe un guion.");
                return false;
            }
            if (!initNativeSpeechIfNeeded()) return false;
            
            finalTranscript = "";
            voiceTracker = new VoiceTracker(textContainer.innerText);
            
            try { recognition.start(); } catch (e) { }
            isListening = true;
            showMessage("Te escucho...", "info");
            return true;
        }

        function stopListeningEngine() {
            isListening = false;
            if (recognition) recognition.stop();
            subtitle.classList.add('subtitle-hidden');
            currentSubtitleText = "";
        }

        // --- AUTO-SCROLL (Modo Video) ---
        function performAutoScroll() {
            if (isAutoScrolling) {
                scrollContainer.scrollBy({ top: scrollSpeed, behavior: 'instant' }); 
                requestAnimationFrame(performAutoScroll);
            }
        }

        const btnScrollPlay = document.getElementById('btn-scroll-play');
        btnScrollPlay.addEventListener('click', () => {
            isAutoScrolling = !isAutoScrolling;
            if (isAutoScrolling) {
                btnScrollPlay.innerText = "⏸";
                btnScrollPlay.classList.add('active');
                performAutoScroll();
            } else {
                btnScrollPlay.innerText = "▶";
                btnScrollPlay.classList.remove('active');
            }
        });

        document.getElementById('btn-scroll-slower').addEventListener('click', () => { scrollSpeed = Math.max(0.5, scrollSpeed - 0.5); });
        document.getElementById('btn-scroll-faster').addEventListener('click', () => { scrollSpeed = Math.min(5.0, scrollSpeed + 0.5); });

        // --- SISTEMA DE PLANTILLA (OVERLAY) ---
        const btnOverlay = document.getElementById('btn-overlay-select');
        btnOverlay.addEventListener('click', () => {
            if (overlayMedia) {
                overlayMedia = null;
                btnOverlay.innerText = "🖼️ Plantilla";
                btnOverlay.classList.remove('active-feature');
                document.getElementById('file-overlay').value = ""; 
            } else {
                document.getElementById('file-overlay').click();
            }
        });

        document.getElementById('file-overlay').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const url = URL.createObjectURL(file);
            overlayMedia = new Image();
            overlayMedia.onload = () => {
                btnOverlay.innerText = "🖼️ Plantilla: ON";
                btnOverlay.classList.add('active-feature');
            };
            overlayMedia.src = url;
        });

        // --- FONDO VIRTUAL IA ---
        async function loadSegmentationModel() {
            if (segmenter || isModelLoading) return;
            
            isModelLoading = true;
            showMessage("Descargando IA de Fondo (MediaPipe)... ⏳", "info");
            
            try {
                const visionModule = await import('https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/vision_bundle.mjs');
                const FilesetResolver = visionModule.FilesetResolver;
                const ImageSegmenter = visionModule.ImageSegmenter;

                const vision = await FilesetResolver.forVisionTasks('https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm');
                
                segmenter = await ImageSegmenter.createFromOptions(vision, {
                    baseOptions: {
                        modelAssetPath: 'https://storage.googleapis.com/mediapipe-models/image_segmenter/selfie_segmenter/float16/latest/selfie_segmenter.tflite',
                        delegate: "GPU"
                    },
                    runningMode: "VIDEO",
                    outputConfidenceMasks: true,
                    outputCategoryMask: false
                });
                
                isModelLoading = false;
                showMessage("IA de Fondo Lista ✅", "info");
                setTimeout(() => subtitle.classList.add('subtitle-hidden'), 2000);
            } catch (e) {
                console.error("Error al cargar MediaPipe:", e);
                showMessage("Fallo al iniciar IA de fondo.", "error");
                isBgRemovalActive = false;
                document.getElementById('btn-bg-toggle').innerText = "🪄 Fondo: Off";
                document.getElementById('btn-bg-toggle').classList.remove('active-feature');
                isModelLoading = false;
            }
        }

        document.getElementById('btn-bg-toggle').addEventListener('click', (e) => {
            isBgRemovalActive = !isBgRemovalActive;
            const btn = e.currentTarget;
            const btnSelect = document.getElementById('btn-bg-select');
            
            if (isBgRemovalActive) {
                btn.innerText = "🪄 Fondo: On";
                btn.classList.add('active-feature');
                btnSelect.style.display = 'flex';
                if (!segmenter) loadSegmentationModel();
            } else {
                btn.innerText = "🪄 Fondo: Off";
                btn.classList.remove('active-feature');
                btnSelect.style.display = 'none';
            }
        });

        document.getElementById('btn-bg-select').addEventListener('click', () => {
            document.getElementById('file-bg').click();
        });

        document.getElementById('file-bg').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            if (bgMedia && bgMedia.tagName === 'VIDEO') {
                bgMedia.pause();
                bgMedia.removeAttribute('src');
                bgMedia.load();
            }

            const url = URL.createObjectURL(file);
            if (file.type.startsWith('video/')) {
                bgMedia = document.createElement('video');
                bgMedia.src = url;
                bgMedia.autoplay = true;
                bgMedia.loop = true;
                bgMedia.muted = true;
                bgMedia.playsInline = true;
                bgMedia.play().catch(console.error);
            } else if (file.type.startsWith('image/')) {
                bgMedia = new Image();
                bgMedia.src = url;
            }
        });

        function setCanvasDimensions(videoW, videoH) {
            const format = formatSelect.value;
            if (format === 'auto') {
                outputWidth = videoW;
                outputHeight = videoH;
            } else {
                const minDimension = Math.min(videoW, videoH);
                if (format === '1:1') {
                    outputWidth = minDimension; outputHeight = minDimension;
                } else if (format === '9:16') {
                    outputWidth = (minDimension * 9) / 16; outputHeight = minDimension;
                    if(outputWidth > videoW){ outputWidth = videoW; outputHeight = (videoW * 16) / 9; }
                } else if (format === '16:9') {
                    outputHeight = (minDimension * 9) / 16; outputWidth = minDimension;
                     if(outputHeight > videoH){ outputHeight = videoH; outputWidth = (videoH * 16) / 9; }
                }
            }
            outputWidth = Math.floor(outputWidth / 2) * 2;
            outputHeight = Math.floor(outputHeight / 2) * 2;
            recordingCanvas.width = outputWidth;
            recordingCanvas.height = outputHeight;
        }

        // --- SISTEMA DE GRABACIÓN DE VIDEO ---
        async function startVideoRecording(useIA) {
            try {
                showMessage("Iniciando cámara...", "info");
                
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: true });
                videoElement.srcObject = stream;
                videoElement.classList.add('active');
                
                videoElement.onloadedmetadata = () => {
                    videoElement.play().catch(e=>console.log("Error auto-play video:", e));
                    setCanvasDimensions(videoElement.videoWidth, videoElement.videoHeight);
                    
                    isRecordingVideo = true;
                    isIARecording = useIA;
                    recordedChunks = [];
                    
                    drawFrame(); 

                    let finalAudioStream = stream;
                    if (useAudioEnhancement) {
                        try {
                            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                            const source = audioCtx.createMediaStreamSource(stream);
                            const destination = audioCtx.createMediaStreamDestination();
                            const highpass = audioCtx.createBiquadFilter(); highpass.type = 'highpass'; highpass.frequency.value = 85;
                            const eqLowMid = audioCtx.createBiquadFilter(); eqLowMid.type = 'peaking'; eqLowMid.frequency.value = 400; eqLowMid.Q.value = 1; eqLowMid.gain.value = -4;
                            const eqPresence = audioCtx.createBiquadFilter(); eqPresence.type = 'peaking'; eqPresence.frequency.value = 4000; eqPresence.Q.value = 1; eqPresence.gain.value = 5;
                            const compressor = audioCtx.createDynamicsCompressor(); compressor.threshold.value = -24; compressor.ratio.value = 4;
                            source.connect(highpass); highpass.connect(eqLowMid);
                            eqLowMid.connect(eqPresence); eqPresence.connect(compressor);
                            compressor.connect(destination);
                            finalAudioStream = destination.stream;
                        } catch (e) {
                            console.warn("Fallo al aplicar efectos de audio:", e);
                        }
                    }

                    try {
                        const canvasStream = recordingCanvas.captureStream(30);
                        const tracks = [...canvasStream.getVideoTracks(), ...finalAudioStream.getAudioTracks()];
                        const combinedStream = new MediaStream(tracks);

                        const mimeTypesToTry = [
                            'video/webm;codecs=vp9,opus',
                            'video/webm;codecs=vp8,opus',
                            'video/webm',
                            'video/mp4'
                        ];
                        
                        let selectedMimeType = '';
                        for (const mimeType of mimeTypesToTry) {
                            if (MediaRecorder.isTypeSupported(mimeType)) {
                                selectedMimeType = mimeType;
                                break;
                            }
                        }

                        if (!selectedMimeType) {
                            showMessage("No hay formato de video soportado.", "error");
                            return;
                        }

                        mediaRecorder = new MediaRecorder(combinedStream, { mimeType: selectedMimeType });
                        
                        mediaRecorder.ondataavailable = e => { 
                            if (e.data && e.data.size > 0) {
                                recordedChunks.push(e.data); 
                            }
                        };
                        
                        mediaRecorder.onstop = () => {
                            if (recordedChunks.length === 0) {
                                showMessage("Error: No se grabó información.", "error");
                                return;
                            }
                            
                            const blob = new Blob(recordedChunks, { type: selectedMimeType || 'video/webm' });
                            const videoUrl = URL.createObjectURL(blob);
                            
                            const formatName = formatSelect.value === 'auto' ? '' : `_${formatSelect.value.replace(':','x')}`;
                            const extension = selectedMimeType.includes('mp4') ? 'mp4' : 'webm';
                            const fileName = isIARecording ? `Teleprompter_IA${formatName}.${extension}` : `Teleprompter${formatName}.${extension}`;
                            
                            showPreviewScreen(videoUrl, fileName);
                        };

                        mediaRecorder.start();
                        startListeningEngine();
                        showMessage("Grabando...", "info");

                        toolbar.classList.add('hidden');
                        floatingStop.classList.add('visible');
                        autoScrollControls.classList.add('visible'); 
                        textContainer.contentEditable = "false";
                        
                    } catch (err) {
                        console.error("Error al iniciar MediaRecorder:", err);
                        showMessage("Error al iniciar grabación.", "error");
                        stopAllProcesses();
                    }
                };
            } catch (err) {
                console.error("Error getUserMedia:", err);
                showMessage("Cámara o Micrófono denegados.", "error");
                toolbar.classList.remove('hidden');
            }
        }

        // --- PANTALLA DE PREVISUALIZACIÓN Y DESCARGA ---
        function showPreviewScreen(videoUrl, fileName) {
            const overlay = document.getElementById('preview-overlay');
            const videoElem = document.getElementById('preview-video');
            const btnDownload = document.getElementById('btn-download-video');
            const btnClose = document.getElementById('btn-close-preview');

            videoElem.src = videoUrl;
            btnDownload.href = videoUrl;
            btnDownload.download = fileName;

            overlay.classList.remove('hidden');

            btnClose.onclick = () => {
                overlay.classList.add('hidden');
                videoElem.pause();
                videoElem.src = "";
                URL.revokeObjectURL(videoUrl); 
                showMessage("Lista para nueva grabación.", "info");
                setTimeout(() => subtitle.classList.add('subtitle-hidden'), 2000);
            };
        }

        // --- RENDERIZADO VISUAL SEGURO ---
        function drawFrame() {
            if (!isRecordingVideo) return;
            
            const vw = videoElement.videoWidth || 1; // Prevenir división por cero
            const vh = videoElement.videoHeight || 1;
            let sourceImage = videoElement;

            // 1. GENERAR CAPA TRANSPARENTE (IA)
            if (isBgRemovalActive && segmenter) {
                if (processCanvas.width !== vw) { processCanvas.width = vw; processCanvas.height = vh; }

                try {
                    const segResult = segmenter.segmentForVideo(videoElement, performance.now());
                    
                    if (segResult.confidenceMasks && segResult.confidenceMasks.length > 0) {
                        const mask = segResult.confidenceMasks[0];
                        if (maskCanvas.width !== mask.width) { maskCanvas.width = mask.width; maskCanvas.height = mask.height; }
                        
                        const maskData = mask.getAsFloat32Array();
                        const imgData = maskCtx.createImageData(mask.width, mask.height);
                        const data = imgData.data;
                        
                        for (let i = 0; i < maskData.length; i++) {
                            data[i * 4] = 255; 
                            data[i * 4 + 1] = 255;
                            data[i * 4 + 2] = 255;
                            data[i * 4 + 3] = maskData[i] > 0.4 ? 255 : 0; 
                        }
                        maskCtx.putImageData(imgData, 0, 0);

                        processCtx.clearRect(0, 0, vw, vh);
                        processCtx.drawImage(maskCanvas, 0, 0, vw, vh); 
                        processCtx.globalCompositeOperation = 'source-in';
                        processCtx.drawImage(videoElement, 0, 0, vw, vh);
                        processCtx.globalCompositeOperation = 'source-over';

                        sourceImage = processCanvas; 
                    }
                } catch(e) {}
            }

            // LIMPIEZA DE LIENZO PRINCIPAL
            ctx.clearRect(0, 0, outputWidth, outputHeight);

            // CAPA 1 (INFERIOR): FONDO
            if (isBgRemovalActive) {
                if (bgMedia) {
                    try {
                        const bgW = bgMedia.videoWidth || bgMedia.width || outputWidth;
                        const bgH = bgMedia.videoHeight || bgMedia.height || outputHeight;
                        const scaleBg = Math.max(outputWidth / bgW, outputHeight / bgH);
                        const drawW = bgW * scaleBg;
                        const drawH = bgH * scaleBg;
                        ctx.drawImage(bgMedia, (outputWidth - drawW)/2, (outputHeight - drawH)/2, drawW, drawH);
                    } catch(e) {} // Protege contra videos no listos
                } else {
                    ctx.fillStyle = '#00ff00';
                    ctx.fillRect(0, 0, outputWidth, outputHeight);
                }
            }

            // CAPA 2 (MEDIO): CÁMARA O PERSONA RECORTADA (CAJA FUERTE DE COORDENADAS)
            try {
                const scale = Math.max(outputWidth / vw, outputHeight / vh);
                const scaledW = vw * scale;
                const scaledH = vh * scale;
                const offsetX = (outputWidth - scaledW) / 2;
                const offsetY = (outputHeight - scaledH) / 2;

                // Solo guardamos y alteramos las coordenadas para el Efecto Espejo de esta capa
                ctx.save(); 
                ctx.translate(outputWidth, 0);
                ctx.scale(-1, 1); 
                ctx.drawImage(sourceImage, -offsetX, offsetY, scaledW, scaledH);
                ctx.restore(); // Reseteamos inmediatamente para no afectar a la plantilla
            } catch(e) {}

            // CAPA 3 (SUPERIOR): PLANTILLA / OVERLAY
            if (overlayMedia) {
                try {
                    // Estiramos la plantilla a los bordes exactos del formato elegido (9:16, 1:1, etc.)
                    ctx.drawImage(overlayMedia, 0, 0, outputWidth, outputHeight);
                } catch(e) {}
            }

            // CAPA 4 (EXTRA SUPERIOR): MARCA DE CONTACTO VISUAL IA
            if (isIARecording) {
                const cx = outputWidth / 2;
                const cy = outputHeight * 0.40;
                const bw = outputWidth * 0.45;
                const bh = outputHeight * 0.15;
                try {
                    const eyeRegion = ctx.getImageData(cx - bw/2, cy - bh/2, bw, bh);
                    ctx.putImageData(eyeRegion, cx - bw/2, (cy - bh/2) - 15);
                } catch(e) {}

                ctx.strokeStyle = "rgba(167, 139, 250, 0.6)"; ctx.lineWidth = 2; ctx.setLineDash([8, 8]);
                ctx.strokeRect(cx - bw/2, cy - bh/2, bw, bh);
                ctx.font = "bold 18px monospace"; ctx.fillStyle = "rgba(167, 139, 250, 0.9)";
                ctx.textAlign = "left"; ctx.textBaseline = "bottom";
                ctx.fillText("◉ AI EYE-CONTACT", (cx - bw/2), (cy - bh/2) - 8);
                ctx.setLineDash([]);
            }
            
            animationFrameId = requestAnimationFrame(drawFrame);
        }

        function stopAllProcesses() {
            if (isRecordingVideo) {
                isRecordingVideo = false;
                if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
                cancelAnimationFrame(animationFrameId);
                const stream = videoElement.srcObject;
                if (stream) stream.getTracks().forEach(track => track.stop());
                videoElement.classList.remove('active');
                
                isAutoScrolling = false;
                btnScrollPlay.innerText = "▶";
                btnScrollPlay.classList.remove('active');
                autoScrollControls.classList.remove('visible');
            }
            if (isListening) stopListeningEngine();

            toolbar.classList.remove('hidden');
            floatingStop.classList.remove('visible');
            textContainer.contentEditable = "true";
        }
    </script>
