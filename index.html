<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teleprompter Pro Studio</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --text-color: #f8fafc;
            --accent-color: #10b981;
            --danger-color: #ef4444;
            --panel-bg: rgba(30, 41, 59, 0.95);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', system-ui, sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* --- Panel de Control --- */
        #toolbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: var(--panel-bg);
            padding: 15px 20px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            z-index: 100;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease, opacity 0.3s ease;
        }

        #toolbar.hidden {
            transform: translateY(-100%);
            opacity: 0;
            pointer-events: none;
        }

        button {
            background-color: #3b82f6;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        button:hover { background-color: #2563eb; }
        button:active { transform: scale(0.95); }
        
        /* Estilos específicos de botones */
        #btn-record-ia { background-color: #8b5cf6; }
        #btn-record-ia:hover { background-color: #7c3aed; }
        .active-audio { background-color: #f59e0b !important; }

        /* --- Contenedor del Texto --- */
        #scroll-container {
            flex-grow: 1;
            overflow-y: auto;
            scroll-behavior: smooth;
            padding: 0 10%;
            scrollbar-width: none;
            background: rgba(15, 23, 42, 0.5); /* Semi-transparente para ver cámara */
        }
        #scroll-container::-webkit-scrollbar { display: none; }

        #teleprompter-text {
            font-size: 64px;
            line-height: 1.6;
            font-weight: 600;
            text-align: center;
            padding-top: 40vh;
            padding-bottom: 60vh;
            outline: none;
            transition: transform 0.3s ease;
        }

        .mirrored { transform: scaleX(-1); }
        .placeholder { color: #64748b; font-weight: normal; }

        /* --- Subtítulos en Vivo --- */
        #live-subtitle {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            color: var(--accent-color);
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 24px;
            font-weight: bold;
            z-index: 100;
            pointer-events: none;
            border: 1px solid rgba(16, 185, 129, 0.3);
            text-align: center;
            max-width: 80%;
            transition: opacity 0.3s;
        }
        .subtitle-hidden { opacity: 0; }
        .subtitle-error { color: #ef4444 !important; border-color: #ef4444 !important; }

        /* --- Estilos de Cámara --- */
        #camera-feed {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            z-index: -1;
            opacity: 0;
            transition: opacity 0.5s;
        }
        #camera-feed.active { opacity: 1; }

        /* --- Alto Contraste --- */
        body.high-contrast {
            --bg-color: #000000;
            --text-color: #eab308;
            --accent-color: #eab308;
            --panel-bg: rgba(0, 0, 0, 0.95);
        }
        body.high-contrast #scroll-container { background: rgba(0, 0, 0, 0.85); }
        body.high-contrast #teleprompter-text { font-weight: 800; }

        /* --- Zona de Enfoque --- */
        #focus-zone {
            position: fixed;
            top: 50%;
            left: 0;
            width: 100%;
            height: 100px;
            transform: translateY(-50%);
            border-top: 2px dashed var(--accent-color);
            border-bottom: 2px dashed var(--accent-color);
            background-color: rgba(0, 0, 0, 0.2);
            pointer-events: none;
            z-index: 40;
            opacity: 1;
            transition: opacity 0.3s;
        }
        #focus-zone.hidden { opacity: 0; }

        /* --- BOTÓN FLOTANTE DE DETENER --- */
        #floating-stop {
            position: fixed;
            top: 20px;
            right: 20px;
            background-color: var(--danger-color);
            color: white;
            border: none;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            cursor: pointer;
            z-index: 200;
            box-shadow: 0 4px 15px rgba(239, 68, 68, 0.5);
            transition: transform 0.2s, opacity 0.3s;
            opacity: 0;
            pointer-events: none;
            animation: pulse-stop 2s infinite;
        }
        #floating-stop.visible {
            opacity: 1;
            pointer-events: auto;
        }
        #floating-stop:hover { transform: scale(1.1); }

        @keyframes pulse-stop {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }
    </style>
</head>
<body>

    <!-- Elementos Ocultos -->
    <video id="camera-feed" autoplay muted playsinline></video>
    <canvas id="recording-canvas" style="display: none;"></canvas>

    <!-- Panel de Controles -->
    <div id="toolbar">
        <button id="btn-record" title="Grabar Video Normal">
            <svg width="20" height="20" fill="currentColor" viewBox="0 0 16 16"><path d="M8 15A7 7 0 1 1 8 1a7 7 0 0 1 0 14zm0 1A8 8 0 1 0 8 0a8 8 0 0 0 0 16z"/><path d="M8 13A5 5 0 1 1 8 3a5 5 0 0 1 0 10z"/><path d="M8 11a3 3 0 1 1 0-6 3 3 0 0 1 0 6z"/></svg>
            Grabar Video
        </button>
        <button id="btn-record-ia" title="Grabar con Corrección Visual IA">
            <svg width="20" height="20" fill="currentColor" viewBox="0 0 16 16"><path d="M8 15A7 7 0 1 1 8 1a7 7 0 0 1 0 14zm0 1A8 8 0 1 0 8 0a8 8 0 0 0 0 16z"/><path d="M10.478 2.347a.5.5 0 0 0-.956 0l-.544 1.632a.5.5 0 0 1-.318.318l-1.632.544a.5.5 0 0 0 0 .956l1.632.544a.5.5 0 0 1 .318.318l.544 1.632a.5.5 0 0 0 .956 0l.544-1.632a.5.5 0 0 1 .318-.318l1.632-.544a.5.5 0 0 0 0-.956l-1.632-.544a.5.5 0 0 1-.318-.318l-.544-1.632zM5.5 6.5A3.5 3.5 0 1 0 9 10a3.5 3.5 0 0 0-3.5-3.5z"/></svg>
            Rec IA ✨
        </button>
        <button id="btn-mic" title="Solo mover el texto (Sin grabar)">
            <svg width="20" height="20" fill="currentColor" viewBox="0 0 16 16"><path d="M5 3a3 3 0 0 1 6 0v5a3 3 0 0 1-6 0V3z"/><path d="M3.5 6.5A.5.5 0 0 1 4 7v1a4 4 0 0 0 8 0V7a.5.5 0 0 1 1 0v1a5 5 0 0 1-4.5 4.975V15h3a.5.5 0 0 1 0 1h-7a.5.5 0 0 1 0-1h3v-2.025A5 5 0 0 1 3 8V7a.5.5 0 0 1 .5-.5z"/></svg>
            Solo Voz
        </button>
        <button id="btn-mirror">🪞 Espejo</button>
        <button id="btn-enhance-audio" title="Filtro de Audio Studio">🎙️ Audio: Normal</button>
        <button id="btn-font-down" title="Reducir Letra">A-</button>
        <button id="btn-font-up" title="Aumentar Letra">A+</button>
        <button id="btn-contrast" title="Modo Alto Contraste">🌓 Contraste</button>
        <button id="btn-focus" title="Línea de Enfoque">⌖ Enfoque</button>
        <button id="btn-reset">↺ Arriba</button>
    </div>

    <!-- Botón Flotante para Detener -->
    <button id="floating-stop" title="Detener Grabación o Escucha">⏹</button>

    <!-- Área de Texto -->
    <div id="scroll-container">
        <div id="teleprompter-text" contenteditable="true" class="placeholder">
            Haz clic aquí y pega tu guion. <br><br>
            Asegúrate de dar permisos de cámara y micrófono. <br>Puedes grabar video, usar la IA visual, o simplemente usar 'Solo Voz' para practicar.
        </div>
    </div>

    <!-- Zona de Enfoque Visual -->
    <div id="focus-zone" class="hidden"></div>

    <!-- Subtítulos -->
    <div id="live-subtitle" class="subtitle-hidden">Esperando tu voz...</div>

    <script>
        /** ALGORITMO VOICE TRACKER - RÁPIDO Y PRECISO */
        class VoiceTracker {
            constructor(fullText) {
                this.scriptWords = this.normalize(fullText).split(/\s+/).filter(w => w.length > 0);
                this.currentWordIndex = 0;
                this.searchWindow = 35; 
                this.nGramSize = 2; // Grupos más pequeños para reaccionar más rápido
            }

            normalize(text) {
                return text.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/[^a-z0-9 ]/g, " ");
            }

            calculateProgress(totalSpoken) {
                if (this.scriptWords.length === 0) return 0;
                
                const spokenWords = this.normalize(totalSpoken).split(/\s+/).filter(w => w.length > 0);
                if (spokenWords.length < this.nGramSize) return this.getScrollPercentage();

                const recentSpoken = spokenWords.slice(-this.nGramSize);
                const startIndex = Math.max(0, this.currentWordIndex - 5);
                const endIndex = Math.min(this.scriptWords.length - this.nGramSize, this.currentWordIndex + this.searchWindow);

                let bestMatchIndex = this.currentWordIndex;
                let highestSimilarity = 0.0;

                for (let i = startIndex; i <= endIndex; i++) {
                    const scriptSlice = this.scriptWords.slice(i, i + this.nGramSize);
                    const similarity = this.calculateSimilarity(recentSpoken, scriptSlice);
                    
                    if (similarity > highestSimilarity && similarity >= 0.5) { // Tolerante
                        highestSimilarity = similarity;
                        bestMatchIndex = i;
                    }
                }

                if (highestSimilarity >= 0.5) {
                    this.currentWordIndex = bestMatchIndex + Math.floor(this.nGramSize / 2);
                }
                return this.getScrollPercentage();
            }

            calculateSimilarity(spoken, scriptSlice) {
                let matches = 0;
                for (let j = 0; j < spoken.length; j++) {
                    if (spoken[j] === scriptSlice[j]) matches++;
                }
                return matches / spoken.length;
            }

            getScrollPercentage() {
                if (this.scriptWords.length === 0) return 0;
                return Math.max(0, Math.min(1, this.currentWordIndex / this.scriptWords.length));
            }
        }

        // --- REFERENCIAS DOM ---
        const textContainer = document.getElementById('teleprompter-text');
        const scrollContainer = document.getElementById('scroll-container');
        const subtitle = document.getElementById('live-subtitle');
        const toolbar = document.getElementById('toolbar');
        const floatingStop = document.getElementById('floating-stop');
        
        const videoElement = document.getElementById('camera-feed');
        const recordingCanvas = document.getElementById('recording-canvas');
        const ctx = recordingCanvas.getContext('2d');

        // Variables de Estado
        let voiceTracker = null;
        let isListening = false;
        let isRecordingVideo = false;
        let isIARecording = false;
        let useAudioEnhancement = false;
        
        let recognition = null;
        let mediaRecorder = null;
        let recordedChunks = [];
        let animationFrameId = null;
        let currentSubtitleText = "";
        let finalTranscript = "";

        // Limpiar placeholder
        textContainer.addEventListener('focus', function() {
            if (this.classList.contains('placeholder')) {
                this.innerHTML = '';
                this.classList.remove('placeholder');
            }
        });

        // --- SISTEMA DE RECONOCIMIENTO DE VOZ (Carga perezosa) ---
        function initNativeSpeechIfNeeded() {
            if (recognition) return true;

            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
                alert("Tu navegador no soporta reconocimiento de voz nativo. Usa Chrome.");
                return false;
            }

            recognition = new SpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = true;
            recognition.lang = 'es-ES';

            recognition.onresult = (event) => {
                let interimTranscript = '';
                
                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    if (event.results[i].isFinal) {
                        finalTranscript += event.results[i][0].transcript + ' ';
                    } else {
                        interimTranscript += event.results[i][0].transcript;
                    }
                }
                
                const totalSpoken = finalTranscript + interimTranscript;
                currentSubtitleText = interimTranscript || finalTranscript.split(" ").slice(-8).join(" ");
                
                if (currentSubtitleText.trim() !== '') {
                    subtitle.innerText = currentSubtitleText;
                    subtitle.classList.remove('subtitle-hidden', 'subtitle-error');
    
                    if (voiceTracker && totalSpoken.trim() !== '') {
                        const progress = voiceTracker.calculateProgress(totalSpoken);
                        const maxScroll = scrollContainer.scrollHeight - scrollContainer.clientHeight;
                        
                        if (maxScroll > 0) {
                            scrollContainer.scrollTo({ top: maxScroll * progress, behavior: 'smooth' });
                        }
                    }
                }
            };

            recognition.onerror = (event) => {
                console.error("Error de voz:", event.error);
                if (event.error !== 'no-speech') {
                    subtitle.innerText = "Error micrófono: " + event.error;
                    subtitle.classList.remove('subtitle-hidden');
                    subtitle.classList.add('subtitle-error');
                }
            };

            recognition.onend = () => {
                if (isListening) {
                    setTimeout(() => {
                        try { recognition.start(); } catch(e) {}
                    }, 300); // Previene bloqueos por reinicios demasiado rápidos
                }
            };

            return true;
        }

        function startListeningEngine() {
            if (textContainer.innerText.trim() === '') {
                alert("Primero pega o escribe un guion.");
                return false;
            }
            
            if (!initNativeSpeechIfNeeded()) return false;
            
            finalTranscript = "";
            voiceTracker = new VoiceTracker(textContainer.innerText);
            
            try {
                recognition.start();
            } catch (e) {
                console.log("El micrófono ya estaba atento");
            }
            
            isListening = true;
            subtitle.classList.remove('subtitle-error', 'subtitle-hidden');
            subtitle.innerText = "Te escucho...";
            return true;
        }

        function stopListeningEngine() {
            isListening = false;
            if (recognition) recognition.stop();
            subtitle.classList.add('subtitle-hidden');
            currentSubtitleText = "";
        }

        // --- SISTEMA DE GRABACIÓN DE VIDEO ---
        async function startVideoRecording(useIA) {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: true });
                videoElement.srcObject = stream;
                videoElement.classList.add('active');
                
                videoElement.onloadedmetadata = () => {
                    recordingCanvas.width = videoElement.videoWidth;
                    recordingCanvas.height = videoElement.videoHeight;
                    isRecordingVideo = true;
                    isIARecording = useIA;
                    recordedChunks = [];
                    
                    drawFrame(); 

                    let finalAudioStream = stream;
                    if (useAudioEnhancement) {
                        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                        const source = audioCtx.createMediaStreamSource(stream);
                        const destination = audioCtx.createMediaStreamDestination();

                        const highpass = audioCtx.createBiquadFilter(); highpass.type = 'highpass'; highpass.frequency.value = 85;
                        const eqLowMid = audioCtx.createBiquadFilter(); eqLowMid.type = 'peaking'; eqLowMid.frequency.value = 400; eqLowMid.Q.value = 1; eqLowMid.gain.value = -4;
                        const eqPresence = audioCtx.createBiquadFilter(); eqPresence.type = 'peaking'; eqPresence.frequency.value = 4000; eqPresence.Q.value = 1; eqPresence.gain.value = 5;
                        const compressor = audioCtx.createDynamicsCompressor(); compressor.threshold.value = -24; compressor.ratio.value = 4;

                        source.connect(highpass); highpass.connect(eqLowMid);
                        eqLowMid.connect(eqPresence); eqPresence.connect(compressor);
                        compressor.connect(destination);
                        finalAudioStream = destination.stream;
                    }

                    const canvasStream = recordingCanvas.captureStream(30);
                    const tracks = [...canvasStream.getVideoTracks(), ...finalAudioStream.getAudioTracks()];
                    const combinedStream = new MediaStream(tracks);

                    mediaRecorder = new MediaRecorder(combinedStream, { mimeType: 'video/webm' });
                    mediaRecorder.ondataavailable = e => { if (e.data.size > 0) recordedChunks.push(e.data); };
                    
                    mediaRecorder.onstop = () => {
                        if (recordedChunks.length === 0) return;
                        const blob = new Blob(recordedChunks, { type: 'video/webm' });
                        const url = URL.createObjectURL(blob);
                        
                        const a = document.createElement('a');
                        a.style.display = 'none';
                        a.href = url;
                        a.download = isIARecording ? 'Teleprompter_IA_Studio.webm' : 'Teleprompter_Video.webm';
                        document.body.appendChild(a);
                        a.click();
                        setTimeout(() => {
                            document.body.removeChild(a);
                            URL.revokeObjectURL(url);
                        }, 100);
                    };

                    mediaRecorder.start();
                };
            } catch (err) {
                console.error("Error de cámara/micrófono:", err);
                subtitle.innerText = "Error: Cámara o micrófono bloqueado.";
                subtitle.classList.remove('subtitle-hidden');
                subtitle.classList.add('subtitle-error');
                
                // Restaurar la interfaz si falló la activación
                toolbar.classList.remove('hidden');
                floatingStop.classList.remove('visible');
                textContainer.contentEditable = "true";
            }
        }

        // --- EVENTOS PRINCIPALES DE BOTONES ---
        // ¡Se inician de forma SÍNCRONA con el clic del usuario para que el micrófono no sea bloqueado!
        
        document.getElementById('btn-mic').addEventListener('click', () => {
            if (startListeningEngine()) {
                toolbar.classList.add('hidden');
                floatingStop.classList.add('visible');
                textContainer.contentEditable = "false";
            }
        });

        document.getElementById('btn-record').addEventListener('click', () => {
            if (textContainer.innerText.trim() === '') {
                alert("Primero pega o escribe un guion.");
                return;
            }
            
            // 1. Iniciamos la VOZ SÍNCRONAMENTE en el mismo milisegundo del clic
            if (!isListening) startListeningEngine();
            
            // 2. Preparamos la UI
            toolbar.classList.add('hidden');
            floatingStop.classList.add('visible');
            textContainer.contentEditable = "false";
            
            // 3. Encendemos el VIDEO
            startVideoRecording(false);
        });

        document.getElementById('btn-record-ia').addEventListener('click', () => {
            if (textContainer.innerText.trim() === '') {
                alert("Primero pega o escribe un guion.");
                return;
            }
            
            // 1. Iniciamos la VOZ SÍNCRONAMENTE en el mismo milisegundo del clic
            if (!isListening) startListeningEngine();
            
            // 2. Preparamos la UI
            toolbar.classList.add('hidden');
            floatingStop.classList.add('visible');
            textContainer.contentEditable = "false";
            
            // 3. Encendemos el VIDEO
            startVideoRecording(true);
        });

        // --- DETENER TODO (BOTÓN FLOTANTE) ---
        function stopAllProcesses() {
            if (isRecordingVideo) {
                isRecordingVideo = false;
                if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                    mediaRecorder.stop();
                }
                cancelAnimationFrame(animationFrameId);
                const stream = videoElement.srcObject;
                if (stream) stream.getTracks().forEach(track => track.stop());
                videoElement.classList.remove('active');
            }
            
            if (isListening) {
                stopListeningEngine();
            }

            toolbar.classList.remove('hidden');
            floatingStop.classList.remove('visible');
            textContainer.contentEditable = "true";
        }
        floatingStop.addEventListener('click', stopAllProcesses);

        // --- RENDERIZADO VISUAL EN CANVAS ---
        function drawFrame() {
            if (!isRecordingVideo) return;
            
            ctx.save();
            ctx.translate(recordingCanvas.width, 0);
            ctx.scale(-1, 1);
            ctx.drawImage(videoElement, 0, 0, recordingCanvas.width, recordingCanvas.height);
            ctx.restore();

            if (isIARecording) {
                const cx = recordingCanvas.width / 2;
                const cy = recordingCanvas.height * 0.40;
                const bw = recordingCanvas.width * 0.45;
                const bh = recordingCanvas.height * 0.15;

                try {
                    const eyeRegion = ctx.getImageData(cx - bw/2, cy - bh/2, bw, bh);
                    ctx.putImageData(eyeRegion, cx - bw/2, (cy - bh/2) - 15);
                } catch(e) {}

                ctx.strokeStyle = "rgba(167, 139, 250, 0.6)";
                ctx.lineWidth = 2; ctx.setLineDash([8, 8]);
                ctx.strokeRect(cx - bw/2, cy - bh/2, bw, bh);
                ctx.font = "bold 18px monospace"; ctx.fillStyle = "rgba(167, 139, 250, 0.9)";
                ctx.textAlign = "left"; ctx.textBaseline = "bottom";
                ctx.fillText("◉ AI EYE-CONTACT ACTIVATED", (cx - bw/2), (cy - bh/2) - 8);
                ctx.setLineDash([]);
            }
            
            if (currentSubtitleText.trim() !== "") {
                const fontSize = Math.floor(recordingCanvas.width * 0.05);
                ctx.fillStyle = "rgba(0, 0, 0, 0.7)";
                ctx.fillRect(0, recordingCanvas.height - (fontSize * 3), recordingCanvas.width, fontSize * 3);
                ctx.font = `bold ${fontSize}px Arial`; ctx.fillStyle = "#10b981";
                ctx.textAlign = "center"; ctx.textBaseline = "middle";
                ctx.fillText(currentSubtitleText, recordingCanvas.width / 2, recordingCanvas.height - (fontSize * 1.5));
            }
            animationFrameId = requestAnimationFrame(drawFrame);
        }

        // --- HERRAMIENTAS ADICIONALES ---
        document.getElementById('btn-mirror').addEventListener('click', () => textContainer.classList.toggle('mirrored'));
        document.getElementById('btn-contrast').addEventListener('click', () => document.body.classList.toggle('high-contrast'));
        document.getElementById('btn-focus').addEventListener('click', () => document.getElementById('focus-zone').classList.toggle('hidden'));
        document.getElementById('btn-reset').addEventListener('click', () => {
            scrollContainer.scrollTo({ top: 0, behavior: 'smooth' });
            if (voiceTracker) voiceTracker.currentWordIndex = 0;
        });

        const btnEnhanceAudio = document.getElementById('btn-enhance-audio');
        btnEnhanceAudio.addEventListener('click', () => {
            useAudioEnhancement = !useAudioEnhancement;
            btnEnhanceAudio.innerText = useAudioEnhancement ? "🎙️ Audio: Studio" : "🎙️ Audio: Normal";
            btnEnhanceAudio.classList.toggle('active-audio', useAudioEnhancement);
        });

        let currentFontSize = 64;
        document.getElementById('btn-font-up').addEventListener('click', () => {
            currentFontSize = Math.min(140, currentFontSize + 8);
            textContainer.style.fontSize = `${currentFontSize}px`;
        });
        document.getElementById('btn-font-down').addEventListener('click', () => {
            currentFontSize = Math.max(24, currentFontSize - 8);
            textContainer.style.fontSize = `${currentFontSize}px`;
        });
    </script>
</body>
</html>
